name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  yaml-lint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: pip install yamllint
      - name: Lint YAML files
        run: |
          cat > .yamllint.yml <<'EOF'
          extends: relaxed
          rules:
            line-length: disable
            truthy: disable
          EOF
          yamllint \
            .config.yaml.template \
            compose.yml

  compose-validate:
    name: Compose Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Validate compose.yml
        run: docker compose config > /dev/null
      - name: Check deployment config contract
        run: |
          compose_vars=$(mktemp)
          example_vars=$(mktemp)
          rg -o '\$\{[A-Z][A-Z0-9_]*' compose.yml | sed 's/^${//' | sort -u > "$compose_vars"
          sed -n \
            -e 's/^# *\([A-Z][A-Z0-9_]*\)=.*/\1/p' \
            -e 's/^\([A-Z][A-Z0-9_]*\)=.*/\1/p' \
            .env.example | sort -u > "$example_vars"
          missing=$(comm -23 "$compose_vars" "$example_vars")
          test -z "$missing" || {
            echo "Compose variables missing from .env.example:"
            echo "$missing"
            exit 1
          }

          root=$(pwd)
          bad_mounts=$(
            docker compose config --format json |
              jq -r '.services[].volumes[]? | select(.type == "bind") | .source' |
              awk -v root="$root/" '
                index($0, root) == 1 &&
                index($0, root "data/") != 1 &&
                index($0, root "models/") != 1 &&
                $0 != root "tmp" { print }
              '
          )
          test -z "$bad_mounts" || {
            echo "Repository source bind mounts are not allowed:"
            echo "$bad_mounts"
            exit 1
          }

          compose_files=$(find . -path './.git' -prune -o \
            \( -iname '*compose*.yml' -o -iname '*compose*.yaml' \) -print)
          test "$compose_files" = "./compose.yml" || {
            echo "Only the root compose.yml deployment file is allowed:"
            echo "$compose_files"
            exit 1
          }

          ! rg -n 'docker (exec|cp)\b' Makefile scripts || {
            echo "Deployment helpers must not modify running containers."
            exit 1
          }

          docker compose config --format json | jq -e '
            (.services["xiaozhi-esp32-server"].environment.DOTTY_PI_URL == "http://dotty-pi:8091") and
            (.services["dotty-pi"].environment.XIAOZHI_ADMIN_BASE_URL == "http://xiaozhi-esp32-server:8003") and
            (.services["dotty-pi"].environment.DOTTY_BEHAVIOUR_URL == "http://dotty-behaviour:8090") and
            (.services["dotty-behaviour"].environment.XIAOZHI_ADMIN_BASE_URL == "http://xiaozhi-esp32-server:8003") and
            (.services["dotty-bridge"].environment.XIAOZHI_ADMIN_BASE_URL == "http://xiaozhi-esp32-server:8003") and
            (.services["dotty-bridge"].environment.DOTTY_BEHAVIOUR_URL == "http://dotty-behaviour:8090")
          ' > /dev/null

  config-parse:
    name: Config Parse
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Parse .config.yaml.template
        run: python3 -c "import yaml; yaml.safe_load(open('.config.yaml.template'))"

  lint:
    name: Ruff Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install ruff
      - name: ruff check
        run: ruff check .

  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install test dependencies
        run: |
          pip install pytest pytest-cov
          pip install -r bridge/requirements.txt -r dotty-behaviour/requirements.txt
          pip install 'numpy>=1.24,<3' 'aiohttp>=3.9,<4' 'httpx>=0.27,<1'
      - name: Run bridge + pi_voice unit tests
        run: |
          pytest tests/ custom-providers/pi_voice/tests/ -v --tb=short \
            --cov --cov-report=
      - name: Run dotty-behaviour unit tests + combined coverage gate
        # Separate pytest process on purpose: dotty-behaviour/conftest.py puts
        # the package's flat modules (config, consumers, routes, …) on sys.path,
        # which would shadow the bridge's modules if both suites were collected
        # in one session. --cov-append accumulates onto the step above, and the
        # --cov-fail-under floor is evaluated on the combined data (currently
        # ~70%). Lower the gate only when intentionally removing tests.
        run: |
          pytest dotty-behaviour/tests/ -v --tb=short \
            --cov --cov-append --cov-report=term --cov-fail-under=56

  pi-ext-tests:
    name: dotty-pi-ext TS Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Install dotty-pi-ext deps
        working-directory: dotty-pi-ext
        run: npm ci
      - name: Run dotty-pi-ext tests
        working-directory: dotty-pi-ext
        run: npm test
      - name: Run dotty-pi RPC server tests
        run: node --test dotty-pi/tests/*.test.mjs

  docs-links:
    name: Docs Link Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --exclude-private
            --offline
            --base https://github.com/BrettKinny/dotty-stackchan
            docs/*.md
            *.md

  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [yaml-lint, compose-validate, config-parse, lint, python-tests, pi-ext-tests, docs-links]
    if: failure()
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      REPO: ${{ github.repository }}
      REF: ${{ github.ref_name }}
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    steps:
      - name: Post Slack notification
        if: env.SLACK_WEBHOOK_URL != ''
        run: |
          payload=$(jq -cn --arg t ":x: *CI failed* · \`${REPO}\` · \`${REF}\` — ${RUN_URL}" '{text: $t}')
          curl -fsS -X POST "$SLACK_WEBHOOK_URL" -H 'Content-Type: application/json' -d "$payload"
