<div id="role-card-body" class="card bg-base-100 shadow-sm overflow-hidden">
  <div class="card-body p-3">
    <div class="flex items-center justify-between gap-3">
      <div class="min-w-0 flex-1">
        <div class="font-semibold text-sm">Role</div>
        {% if state %}
        <form hx-post="/ui/actions/roles/activate" hx-target="#role-card-body"
              hx-swap="outerHTML" hx-disabled-elt="find select"
              class="mt-1">
          <select name="role_id" aria-label="Active role"
                  class="select select-bordered select-sm w-full"
                  onchange="this.form.requestSubmit()">
            {% for role in state.roles %}
            <option value="{{ role.id }}"
                    {% if role.id == state.active_role_id %}selected{% endif %}>
              {{ role.name }}
            </option>
            {% endfor %}
          </select>
        </form>
        {% else %}
        <div class="text-xs text-error mt-1">{{ error }}</div>
        {% endif %}
      </div>
      <button type="button" class="btn btn-sm btn-outline"
              hx-get="/ui/roles/manage" hx-target="#role-modal-body"
              hx-swap="innerHTML"
              onclick="document.getElementById('role-modal').showModal()">
        Manage
      </button>
    </div>
    {% if error and state %}
    <div class="text-xs text-error mt-2">{{ error }}</div>
    {% endif %}
  </div>
</div>
