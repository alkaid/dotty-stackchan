<div id="voice-card-body" class="card bg-base-100 shadow-sm overflow-hidden">
  <div class="card-body p-3">
    <div class="flex items-center justify-between gap-3">
      <div class="min-w-0">
        <div class="font-semibold text-sm">Voice</div>
        {% if state and active_voice %}
        <div class="text-xs text-base-content/60 mt-1 truncate">
          {{ active_voice.name }} · {{ "ChatTTS" if active_voice.provider == "chattts" else "EdgeTTS" }}
        </div>
        {% else %}
        <div class="text-xs text-error mt-1">{{ error }}</div>
        {% endif %}
      </div>
      <button type="button" class="btn btn-sm btn-outline"
              hx-get="/ui/voices/manage" hx-target="#voice-modal-body"
              hx-swap="innerHTML"
              onclick="document.getElementById('voice-modal').showModal()">
        Manage
      </button>
    </div>
  </div>
</div>
